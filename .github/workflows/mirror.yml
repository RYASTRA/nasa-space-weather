name: Mirror to GitLab

on: [push, delete]

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Dependabot pushes run with a read-only token and cannot read the
    # GITLAB_TOKEN secret, so the mirror would always fail auth on them. Skip:
    # these throwaway branches don't need mirroring, and real pushes to main
    # (where the secret is available) still mirror normally.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Important for mirroring history

      - name: Mirror to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/RYASTRA/nasa-space-weather.git
